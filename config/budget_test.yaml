mode: test
total_budget_cny: 0.40    # test 模式: 前 2 分钟 + 更多帧
fail_fast: true
max_tokens_per_call: 2500

stage_limits:
  type_detect: 0.005
  vision:      0.15    # 15 帧 qwen3-vl-plus
  ocr:         0.005
  anchor:      0.005
  outline:     0.025   # gpt-4o-mini, 留余量
  section:     0.10    # 2-3 section deepseek-v3.2
  polish:      0.015
  critique:    0
  revise:      0
  map:         0
  reduce:      0

call_limits:
  type_detect: 1
  vision:      15
  ocr:         3
  anchor:      1
  outline:     1
  section:     8
  polish:      1
  critique:    0
  revise:      0
  map:         0
  reduce:      0

frame_cap: 15
chapter_cap: 3
